services:
  neo4j:
    image: neo4j:5-community
    container_name: assistx-neo4j
    profiles:
      - neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-livelongandprosper}
      - NEO4J_dbms_memory_pagecache_size=${NEO4J_CACHE_SIZE:-512M}
      - NEO4J_dbms_memory_heap_max__size=${NEO4J_HEAP_SIZE:-1G}
    ports:
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-livelongandprosper}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: assistx-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assistx-api
    restart: unless-stopped
    environment:
      # --- AssistX core ---
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-admin}
      - BASIC_AUTH_PASS=${BASIC_AUTH_PASS:-change-me}
      - TRUSTED_AUTH_HEADER=${TRUSTED_AUTH_HEADER:-}
      - API_TOKEN=${API_TOKEN:-}                    # if set, /upload-audio requires x-api-token
      - WS_AUTH_REQUIRED=${WS_AUTH_REQUIRED:-1}
      - WS_AUTH_TOKEN=${WS_AUTH_TOKEN:-}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}

      # --- Datastores (defaults assume containerized infra) ---
      - NEO4J_URI=${NEO4J_URI:-bolt://host.docker.internal:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-livelongandprosper}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-assistx}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}

      # --- LLM Backend (LM Studio / OpenAI-compatible) ---
      - LLM_BACKEND=${LLM_BACKEND:-openai}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-not-needed}
      - LLM_MODEL=${LLM_MODEL:-llama3.1:8b}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}

      # --- Optional advisory draft endpoint ---
      - DRAFT_MODEL_BASE_URL=${DRAFT_MODEL_BASE_URL:-}
      - DRAFT_MODEL_NAME=${DRAFT_MODEL_NAME:-}
      - DRAFT_MODEL_API_KEY=${DRAFT_MODEL_API_KEY:-not-needed}
      - DRAFT_MODEL_TIMEOUT_S=${DRAFT_MODEL_TIMEOUT_S:-20}

      # --- Whisper runtime knobs ---
      - WHISPER_DEVICE=${WHISPER_DEVICE:-auto}      # auto|cpu|cuda
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - TRANSCRIPTIONS_ROOT=/app/transcriptions
      - XDG_CACHE_HOME=/app/.cache

      # --- Paperclip dispatch ---
      - PAPERCLIP_API_URL=http://host.docker.internal:3100/api
      - PAPERCLIP_API_TOKEN=${PAPERCLIP_API_TOKEN:-}
      - PAPERCLIP_WORKSPACE_ID=${PAPERCLIP_WORKSPACE_ID:-}
      - PAPERCLIP_AGENT_ID=${PAPERCLIP_AGENT_ID:-Hermes Agent}
      - PAPERCLIP_WEBHOOK_SECRET=${PAPERCLIP_WEBHOOK_SECRET:-}
      - VOICE_WEBHOOK_SECRET=${VOICE_WEBHOOK_SECRET:-}

      # --- Overlay services ---
      - AUTO_ROUTER_BASE_URL=${AUTO_ROUTER_BASE_URL:-http://auto-router:8088}
      - AUTO_ASSIGN_BASE_URL=${AUTO_ASSIGN_BASE_URL:-http://auto-assign:8090}

      # --- W-27: make ASSISTX_OVERLAY_MODE explicit ---
      # Default matches the unified router+assign path. Override as needed.
      - ASSISTX_OVERLAY_MODE=${ASSISTX_OVERLAY_MODE:-router_plus_assign}

      # --- App paths ---
      - CACHE_PATH=/app/.assistx_cache.sqlite
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 6G
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
      - assistx_cache:/app/.cache
      - ./artifacts:/app/artifacts
      - transcriptions:/app/transcriptions
      - ./.assistx_cache.sqlite:/app/.assistx_cache.sqlite
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport urllib.request,sys\ntry:\n  urllib.request.urlopen('http://localhost:8000/health', timeout=2)\n  print('ok')\n  sys.exit(0)\nexcept Exception as e:\n  print(e); sys.exit(1)\nPY"
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  worker:
    env_file:
      - .env
    build:
      context: .
    container_name: assistx-worker
    command: python -m assistx.worker
    restart: unless-stopped
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - RQ_QUEUE=${RQ_QUEUE:-assistx}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-32}
      - NEO4J_URI=${NEO4J_URI:-bolt://host.docker.internal:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-livelongandprosper}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-assistx}
      - LLM_BACKEND=${LLM_BACKEND:-openai}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-not-needed}
      - LLM_MODEL=${LLM_MODEL:-llama3.1:8b}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - CACHE_PATH=/app/.assistx_cache.sqlite
      - WHISPER_DEVICE=${WHISPER_DEVICE:-auto}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - TRANSCRIPTIONS_ROOT=/app/transcriptions
      - XDG_CACHE_HOME=/app/.cache
      - PAPERCLIP_API_URL=${PAPERCLIP_API_URL:-http://host.docker.internal:3100/api}
      - PAPERCLIP_API_TOKEN=${PAPERCLIP_API_TOKEN:-}
      - PAPERCLIP_WORKSPACE_ID=${PAPERCLIP_WORKSPACE_ID:-}
      - PAPERCLIP_AGENT_ID=${PAPERCLIP_AGENT_ID:-Hermes Agent}
      - PAPERCLIP_WEBHOOK_SECRET=${PAPERCLIP_WEBHOOK_SECRET:-}
      - ORCHESTRATOR_INTERVAL=${ORCHESTRATOR_INTERVAL:-15}
      - ORCHESTRATOR_INTENTS_PER_CYCLE=${ORCHESTRATOR_INTENTS_PER_CYCLE:-3}
      - MAINTENANCE_INTERVAL_SECONDS=${MAINTENANCE_INTERVAL_SECONDS:-1800}
      - TASK_RETENTION_DAYS=${TASK_RETENTION_DAYS:-30}
      - MEMORY_RETENTION_DAYS=${MEMORY_RETENTION_DAYS:-90}
      - WORKER_HEALTH_PORT=${WORKER_HEALTH_PORT:-8100}
      # --- W-27: make ASSISTX_OVERLAY_MODE explicit on the worker too ---
      - ASSISTX_OVERLAY_MODE=${ASSISTX_OVERLAY_MODE:-router_plus_assign}
      # Worker reaches the API via Docker DNS (host.docker.internal often
      # misses the API from inside the worker network).
      - ASSISTX_URL=http://assistx-api:8000
      - FLEET_ASSISTX_URL=http://assistx-api:8000
      - FLEET_STATE_PATH=/home/scott/git/lms/fleet_state.json
      - FLEET_LOADOUT_PATH=/home/scott/git/lms/fleet_loadout.json
      # assistx-only OpenRouter key (free tier) used as review/orchestrator tier
      # for non-sensitive traffic. Provided via .env (OPENROUTER_API_KEY).
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Per-job timeout for RQ (agent loops can exceed the 180s default).
      - RQ_JOB_TIMEOUT_S=${RQ_JOB_TIMEOUT_S:-1800}
      # LLM call timeout and overall per-task wall-clock guard (fail fast so the
      # drain keeps moving instead of wedging on one slow/hung node).
      - LLM_TIMEOUT_S=${LLM_TIMEOUT_S:-45}
      - TASK_WALLCLOCK_S=${TASK_WALLCLOCK_S:-600}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
      - assistx_cache:/app/.cache
      - ./artifacts:/app/artifacts
      - transcriptions:/app/transcriptions
      - ./.assistx_cache.sqlite:/app/.assistx_cache.sqlite
      - /home/scott/git/lms:/home/scott/git/lms:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  hermes-adapter:
    env_file:
      - .env
    build:
      context: .
    container_name: assistx-hermes-adapter
    command: sh -c "umask 0002 && exec python -m assistx.agents.hermes_agent_adapter"
    user: "0:1000"
    restart: unless-stopped
    environment:
      - ASSISTX_URL=${ASSISTX_URL:-http://host.docker.internal:8000}
      - ASSISTX_USER=${ASSISTX_USER:-admin}
      - ASSISTX_PASS=${ASSISTX_PASS:-change-me}
      - HERMES_AGENT_ID=${HERMES_AGENT_ID:-hermes-local}
      - HERMES_AGENT_CAPABILITIES=${HERMES_AGENT_CAPABILITIES:-terminal,file,code_execution,web,search,browser,vision,skills,memory,session_search,delegation,cronjob,clarify,todo}
      - HERMES_TOOLSETS=${HERMES_TOOLSETS:-terminal,file,code_execution,web,search,browser,vision,skills,memory,session_search,delegation,cronjob,clarify,todo}
      - HERMES_POLL_INTERVAL=${HERMES_POLL_INTERVAL:-15}
      - HERMES_TASK_TIMEOUT=${HERMES_TASK_TIMEOUT:-300}
      - HERMES_MAX_TASKS_PER_LOOP=${HERMES_MAX_TASKS_PER_LOOP:-3}
      - HERMES_BIN=${HERMES_BIN:-hermes}
      - HERMES_SMOKE_MODEL=${HERMES_SMOKE_MODEL:-refinedtoolcallv5-3b}
      - HERMES_LOG_LEVEL=${HERMES_LOG_LEVEL:-INFO}
      - AUTO_ASSIGN_BASE_URL=${AUTO_ASSIGN_BASE_URL:-http://host.docker.internal:8090}
      - HERMES_PROVIDER=${HERMES_PROVIDER:-assistx-router}
      - HERMES_LM_BASE_URL=${HERMES_LM_BASE_URL:-http://host.docker.internal:8088/v1}
      - HERMES_MODEL=${HERMES_MODEL:-refinedtoolcallv5-3b}
      - HERMES_LEASE_SECONDS=${HERMES_LEASE_SECONDS:-900}
      - HERMES_SELFTASK_ENABLED=${HERMES_SELFTASK_ENABLED:-true}
      - HERMES_SELFTASK_DIR=${HERMES_SELFTASK_DIR:-/app/hermes-home/harvest}
      - HERMES_SELFTASK_KIND=${HERMES_SELFTASK_KIND:-harvest}
      - HERMES_SELFTASK_TIMEOUT=${HERMES_SELFTASK_TIMEOUT:-180}
      - HERMES_SELFTASK_MODEL=${HERMES_SELFTASK_MODEL:-refinedtoolcallv5-3b}
      - HERMES_SELFTASK_MODELS=${HERMES_SELFTASK_MODELS:-refinedtoolcallv5-3b}
      - HERMES_SELFTASK_BULK_MODELS=${HERMES_SELFTASK_BULK_MODELS:-qwen3.5-0.8b-claude-4.6-opus-reasoning-distilled,refinedtoolcallv5-3b}
      - HERMES_DELEGATE_OPENCODE_TIERS=${HERMES_DELEGATE_OPENCODE_TIERS:-tool-small,reasoning-mid,reasoning-large}
      - HERMES_DELEGATE_RETURN_FORMAT=${HERMES_DELEGATE_RETURN_FORMAT:-verbatim}
      - HERMES_HOME=${HERMES_HOME:-/app/hermes-home}
      - HERMES_PROFILES_PATH=${HERMES_PROFILES_PATH:-/app/hermes-home/profiles.yaml}
      - HERMES_EVAL_PATH=${HERMES_EVAL_PATH:-/media/scott/SSD_4TB/hermes-home/.hermes/profiles.json}
      - NEO4J_URI=${NEO4J_URI:-bolt://host.docker.internal:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-knowledge_graph_2026}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-assistx}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - FLEET_STATE_PATH=${FLEET_STATE_PATH:-/home/scott/git/lms/fleet_state.json}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Source code (live edit)
      - ./src:/app/src
      # Git repos at canonical paths
      - /home/scott/git/auto-assist:/home/scott/git/auto-assist:rw
      - /home/scott/git/auto-router:/home/scott/git/auto-router:rw
      - /home/scott/git/hermes-agent:/home/scott/git/hermes-agent:rw
      - /home/scott/git/auto-assign:/home/scott/git/auto-assign:rw
      - /home/scott/git/lms:/home/scott/git/lms:ro
      # SSD workspace
      - /media/scott/SSD_4TB:/media/scott/SSD_4TB:rw
      # NAS workspace
      - /media/scott/NAS5:/media/scott/NAS5:rw
      # MCP servers (read-only, from host .hermes)
      - /home/scott/.hermes/mcp:/root/.hermes/mcp:ro
      # Container Hermes home (mutable state on SSD)
      - /media/scott/SSD_4TB/hermes-home/container/hermes-home:/app/hermes-home
      # Knowledge / eval data
      - /home/scott/knowledge:/root/knowledge:ro
      - /media/scott/SSD_4TB/hermes-home/.hermes/profiles.json:/media/scott/SSD_4TB/hermes-home/.hermes/profiles.json:ro
      - /media/scott/SSD_4TB/hermes-home/.hermes/SOUL.md:/media/scott/SSD_4TB/hermes-home/.hermes/SOUL.md:ro
    #  hermes-adapter is always-on, not profile-gated
    # (remove profiles: to make it first-class)

volumes:
  assistx_cache: {}
  transcriptions: {}
  neo4j_data: {}

