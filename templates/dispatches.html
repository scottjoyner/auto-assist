{% extends "base.html" %}
{% block title %}AssistX – Dispatches{% endblock %}

{% block content %}
<section class="card">
  <h2>Dispatches</h2>
  <p class="kicker">AssistX dispatch records linking tasks to Paperclip/Hermes execution.</p>

  <div class="actions mb-4">
    <a class="btn secondary" href="/dispatches">All</a>
    <a class="btn secondary" href="/dispatches?status=OPEN">Open</a>
    <a class="btn secondary" href="/dispatches?status=ASSIGNED">Assigned</a>
    <a class="btn secondary" href="/dispatches?status=RUNNING">Running</a>
    <a class="btn secondary" href="/dispatches?status=DONE">Done</a>
    <a class="btn secondary" href="/dispatches?status=FAILED">Failed</a>
    <a class="btn secondary" href="/dispatches?status=CANCELLED">Cancelled</a>
  </div>

  <div id="dispatch-list" class="feed feed-lg">
    <div class="row muted">Loading dispatches…</div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
(async () => {
  const esc = window.UIUtils?.escapeHtml || ((s) => (s ?? "").toString());
  const shortId = window.UIUtils?.shortId || ((v, n = 8) => (v || '').toString().slice(0, n));
  const badgeLine = window.UIUtils?.renderBadgeLine || ((parts) => `<div class="summary-line">${(parts || []).filter(Boolean).join(" ")}</div>`);

  const params = new URLSearchParams(window.location.search);
  const status = params.get('status') || '';
  const url = status ? `/api/dispatches?status=${status}&limit=100` : '/api/dispatches?limit=100';
  const r = await fetch(url);
  const data = await r.json();
  const list = document.getElementById('dispatch-list');
  list.innerHTML = '';
  if (!data || !data.items || data.items.length === 0) {
    list.innerHTML = '<div class="row muted">No dispatches found.</div>';
    return;
  }
  data.items.forEach(d => {
    const row = document.createElement('div');
    row.className = 'row';
    const dispatchShort = shortId(d.id, 8);
    const taskShort = shortId(d.task_id, 12);
    const line = badgeLine([
      `<code>${esc(dispatchShort)}</code>`,
      `<span class="badge">${esc(d.status || '?')}</span>`,
      `<span class="muted">priority: ${esc(d.priority || '—')}</span>`,
      d.paperclip_issue_id ? `<span class="badge">issue: ${esc(d.paperclip_issue_id)}</span>` : '',
      d.paperclip_agent_id ? `<span class="muted">agent: ${esc(d.paperclip_agent_id)}</span>` : '',
    ]);
    row.innerHTML = `
      ${line}
      <div class="mt-2">
        task: <code>${esc(taskShort)}</code>
        ${d.created_at_ts ? `· ${esc(new Date(d.created_at_ts).toLocaleString())}` : ''}
      </div>
    `;
    list.appendChild(row);
  });
})();
</script>
{% endblock %}
