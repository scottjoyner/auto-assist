{% extends "base.html" %}
{% block title %}AssistX – Intents{% endblock %}

{% block content %}
<section class="card">
  <h2>Intents</h2>
  <p class="kicker">Raw incoming intents from voice, UI, webhook, schedule, and other sources.</p>
  <div class="grid mt-5">
    <div class="half panel">
      <label class="label" for="source-filter">Source</label>
      <select id="source-filter" onchange="window.location.href=this.value ? `/intents?source=${this.value}` : '/intents'">
        <option value="">All sources</option>
        <option value="voice" {% if request.query_params.get('source') == 'voice' %}selected{% endif %}>Voice</option>
        <option value="ui" {% if request.query_params.get('source') == 'ui' %}selected{% endif %}>UI</option>
        <option value="webhook" {% if request.query_params.get('source') == 'webhook' %}selected{% endif %}>Webhook</option>
        <option value="schedule" {% if request.query_params.get('source') == 'schedule' %}selected{% endif %}>Schedule</option>
        <option value="manual" {% if request.query_params.get('source') == 'manual' %}selected{% endif %}>Manual</option>
      </select>
    </div>
  </div>

  <div id="intent-list" class="feed feed-lg mt-5">
    <div class="row muted">Loading intents…</div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
(async () => {
  const esc = window.UIUtils?.escapeHtml || ((s) => (s ?? "").toString());
  const shortId = window.UIUtils?.shortId || ((v, n = 8) => (v || '').toString().slice(0, n));

  const params = new URLSearchParams(window.location.search);
  const source = params.get('source') || '';
  const url = source ? `/api/intents?source=${source}&limit=100` : '/api/intents?limit=100';
  const r = await fetch(url);
  const data = await r.json();
  const list = document.getElementById('intent-list');
  list.innerHTML = '';
  if (!data || !data.items || data.items.length === 0) {
    list.innerHTML = '<div class="row muted">No intents found.</div>';
    return;
  }
  data.items.forEach(i => {
    const row = document.createElement('div');
    row.className = 'row';
    const idShort = shortId(i.id, 8);
    const ts = i.client_ts || new Date(i.created_at_ts || Date.now()).toISOString();
    row.innerHTML = `
      <div class="summary-line">
        <span class="badge">${esc(i.source || '?')}</span>
        <span class="muted">${esc(ts)}</span>
        <code>${esc(idShort)}</code>
      </div>
      <div class="mt-2">${esc(i.text || '')}</div>
    `;
    list.appendChild(row);
  });
})();
</script>
{% endblock %}
