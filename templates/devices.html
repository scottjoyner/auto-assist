{% extends "base.html" %}
{% block title %}AssistX – Devices{% endblock %}

{% block content %}
<section class="card">
  <h2>Devices</h2>
  <p class="kicker">Registered agent devices, capabilities, and last seen times.</p>
  <div id="device-list" class="feed feed-lg mt-5">
    <div class="row muted">Loading devices…</div>
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
(async () => {
  const esc = window.UIUtils?.escapeHtml || ((s) => (s ?? "").toString());

  const r = await fetch('/api/devices?limit=100');
  const data = await r.json();
  const list = document.getElementById('device-list');
  list.innerHTML = '';
  if (!data || !data.items || data.items.length === 0) {
    list.innerHTML = '<div class="row muted">No devices found.</div>';
    return;
  }
  data.items.forEach(d => {
    const row = document.createElement('div');
    row.className = 'row';
    const caps = d.capabilities ? (Array.isArray(d.capabilities) ? d.capabilities.join(', ') : d.capabilities) : '';
    row.innerHTML = `
      <div class="summary-line">
        <code>${esc(d.hostname || d.id)}</code>
        <span class="badge">${esc(d.platform || 'unknown')}</span>
        ${d.last_seen_at_ts ? `<span class="muted">last seen: ${esc(new Date(d.last_seen_at_ts).toLocaleString())}</span>` : ''}
      </div>
      ${caps ? `<div class="muted mt-2">capabilities: ${esc(caps)}</div>` : ''}
      <div class="muted mt-2">
        id: <code>${esc(d.id)}</code>
      </div>
    `;
    list.appendChild(row);
  });
})();
</script>
{% endblock %}
