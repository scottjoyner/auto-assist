services:
  ollama:
    restart: unless-stopped
    image: ollama/ollama:latest
    container_name: assistx-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU (optional):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: ["gpu"]

  api:
    depends_on:
      ollama:
        condition: service_started

  worker:
    depends_on:
      ollama:
        condition: service_started

volumes:
  ollama_data: {}
