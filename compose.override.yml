# compose.override.yml
services:
  api:
    depends_on: []
    volumes:
      - /mnt/8TB_2025:/data:ro
    environment:
      - NEO4J_URI=bolt://host.docker.internal:7687
      - NEO4J_DATABASE=assistx
      - LLM_BACKEND=openai
      - OPENAI_BASE_URL=http://host.docker.internal:1234/v1

  worker:
    depends_on: []
    volumes:
      - /mnt/8TB_2025:/data:ro
    environment:
      - LLM_BACKEND=openai
      - OPENAI_BASE_URL=http://host.docker.internal:1234/v1
      - NEO4J_URI=bolt://host.docker.internal:7687
      - NEO4J_DATABASE=assistx

