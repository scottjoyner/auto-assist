# compose.override.yml
# Used for local development where Redis/Neo4j/LLM run on the host.
# Clears depends_on so services start immediately without waiting for
# containerized infra (Redis, Neo4j). Override host endpoints and mount
# host data volumes for local file access.
services:
  api:
    depends_on: []
    volumes:
      - /mnt/8TB_2025:/data:ro
    environment:
      - NEO4J_URI=bolt://host.docker.internal:7687
      - NEO4J_DATABASE=assistx
      - LLM_BACKEND=openai
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-not-needed}
      - LLM_MODEL=${LLM_MODEL:-llama3.1:8b}

  worker:
    depends_on: []
    volumes:
      - /mnt/8TB_2025:/data:ro
    environment:
      - LLM_BACKEND=openai
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-not-needed}
      - LLM_MODEL=${LLM_MODEL:-llama3.1:8b}
      - NEO4J_URI=bolt://host.docker.internal:7687
      - NEO4J_DATABASE=assistx

