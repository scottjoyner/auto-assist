# compose.override.gpu.yml
services:
  api:
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    environment:
      # Use ROCm HIP backend inside WSL
      - WHISPER_DEVICE=hip
      - WHISPER_COMPUTE_TYPE=float16
      # optional: allow fallback to CPU if HIP not detected
      - WHISPER_FALLBACK=cpu

