# compose.override.gpu.yml
services:
  api:
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    environment:
      # Use ROCm HIP backend inside WSL
      - WHISPER_DEVICE=hip
      - WHISPER_COMPUTE_TYPE=float16
      # optional: allow fallback to CPU if HIP not detected
      - WHISPER_FALLBACK=cpu

  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    environment:
      # Ollama doesn’t yet support ROCm natively — if you’re containerizing it, it will
      # either run CPU mode or use DirectML on Windows. For now we keep GPU flag so
      # compose knows it *wants* acceleration.
      - OLLAMA_DEVICE=hip
      - OLLAMA_COMPUTE_TYPE=float16
